<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnalisation de T-shirt - Bî You</title>
    <style>
        /* CHARTE GRAPHIQUE */
        body {
            background-color: #F5F0E8; /* Blanc washi */
            color: #1A1A1A; /* Noir d'encre */
            font-family: 'Cormorant Garamond', Georgia, serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Futura', sans-serif;
            margin-bottom: 20px;
        }

        .product-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin-bottom: 20px;
        }

        .product-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-container svg {
            position: absolute;
            top: -14px;
            left: -10px;
            width: 107%;
            height: 107%;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s ease;
            mix-blend-mode: multiply;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .controls button {
            background-color: #C9A84C; /* Or de laque */
            color: #F5F0E8; /* Blanc washi */
            border: none;
            padding: 10px 20px;
            font-family: 'Futura', sans-serif;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .controls button:hover {
            background-color: #7BA7A0; /* Bleu céladon */
        }

        .color-palette {
            display: flex;
            gap: 10px;
        }

        .color-palette div {
            width: 30px;
            height: 30px;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-palette div.active {
            border-color: #1A1A1A; /* Noir d'encre */
        }

        .opacity-slider {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .add-to-cart {
            margin-top: 20px;
            background-color: #1A1A1A; /* Noir d'encre */
            color: #F5F0E8; /* Blanc washi */
            border: none;
            padding: 15px 30px;
            font-family: 'Futura', sans-serif;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .add-to-cart:hover {
            background-color: #C9A84C; /* Or de laque */
        }
    </style>
</head>
<body>
    <h1>Personnalisez votre pièce</h1>

    <!-- ZONE PRODUIT -->
    <div class="product-container">
        <img id="product-image" src="assets/test_svg/Teeshirt_face-02_Plan de travail 1.png" alt="T-shirt face">
        <svg id="product-svg"></svg>
    </div>

    <!-- PANNEAU DE CONTRÔLE -->
    <div class="controls">
        <!-- Boutons Face/Dos -->
        <div>
            <button id="btn-face">Face</button>
            <button id="btn-dos">Dos</button>
        </div>

        <!-- Palette de couleurs -->
        <div class="color-palette">
            <div class="color" data-color="#1A1A1A" style="background-color: #1A1A1A;"></div>
            <div class="color" data-color="#7BA7A0" style="background-color: #7BA7A0;"></div>
            <div class="color" data-color="#F5F0E8" style="background-color: #F5F0E8;"></div>
            <div class="color" data-color="#C9A84C" style="background-color: #C9A84C;"></div>
            <div class="color" data-color="#C0392B" style="background-color: #C0392B;"></div>
        </div>

        <!-- Slider d'opacité -->
        <div class="opacity-slider">
            <label for="opacity">Opacité</label>
            <input id="opacity" type="range" min="0.1" max="1" step="0.1" value="1">
        </div>
    </div>

    <!-- Bouton Ajouter au panier -->
    <button class="add-to-cart">Ajouter au panier</button>

    <script>
        // VARIABLES GLOBALES
        const productImage = document.getElementById('product-image');
        const productSvg = document.getElementById('product-svg');
        const btnFace = document.getElementById('btn-face');
        const btnDos = document.getElementById('btn-dos');
        const colorPalette = document.querySelectorAll('.color');
        const opacitySlider = document.getElementById('opacity');

        let currentColor = '#1A1A1A'; // Couleur par défaut

        // CHARGEMENT DU SVG
        function loadSvg(url) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    productSvg.innerHTML = data;
                    applyColorAndOpacity();
                });
        }

        // APPLIQUER LA COULEUR ET L'OPACITÉ
        function applyColorAndOpacity() {
            const elements = productSvg.querySelectorAll('path, rect, circle, polygon');
            elements.forEach(el => {
                el.style.fill = currentColor;
                el.style.opacity = opacitySlider.value;
            });
        }

        // SWITCH FACE/DOS
        btnFace.addEventListener('click', () => {
            productImage.src = 'assets/test_svg/Teeshirt_face-02_Plan de travail 1.png';
            loadSvg('assets/test_svg/svg_face_Plan de travail 1.svg');
        });

        btnDos.addEventListener('click', () => {
            productImage.src = 'assets/test_svg/Teeshirt_dos-02.png';
            loadSvg('assets/test_svg/svg_dos_Plan de travail 1-02.svg');
        });

        // CHANGER LA COULEUR
        colorPalette.forEach(colorDiv => {
            colorDiv.addEventListener('click', () => {
                currentColor = colorDiv.dataset.color;
                colorPalette.forEach(div => div.classList.remove('active'));
                colorDiv.classList.add('active');
                applyColorAndOpacity();
            });
        });

        // AJUSTER L'OPACITÉ
        opacitySlider.addEventListener('input', applyColorAndOpacity);

        // CHARGEMENT INITIAL
        loadSvg('assets/test_svg/svg_face_Plan de travail 1.svg');
    </script>
</body>
</html>
